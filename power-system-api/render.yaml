services:
  - type: web
    name: powerflow-api
    runtime: python
    rootDir: power-system-api
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: GEMINI_API_KEY
        sync: false   # Render 대시보드에서 직접 입력 (보안)
